{% extends "base.html" %}
{% block title %}{{ t('auth.register') }} · {{ t('app.name') }}{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>{{ t('auth.register') }}</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/register">
    <label>{{ t('auth.name') }}<input type="text" name="name" required /></label>
    <label>{{ t('auth.email') }}<input type="email" name="email" required /></label>
    <label>{{ t('auth.password') }}<input type="password" name="password" minlength="8" required /></label>
    <label>{{ t('auth.role') }}
      <select name="role" id="role" onchange="document.getElementById('course-row').style.display = this.value==='student' ? 'block':'none'">
        <option value="student">{{ t('role.student') }}</option>
        <option value="teacher">{{ t('role.teacher') }}</option>
      </select>
    </label>
    <div id="course-row">
      <label>{{ t('auth.course') }}
        <select name="course_id">
          <option value="">{{ t('auth.course_none') }}</option>
          {% for c in courses %}<option value="{{ c.id }}">{{ c.name }} (#{{ c.id }})</option>{% endfor %}
        </select>
      </label>
    </div>
    <button class="btn-primary block" type="submit">{{ t('auth.register') }}</button>
  </form>
  <p class="muted">{{ t('auth.have_account') }} <a href="/login">{{ t('auth.login') }}</a></p>
</div>
{% endblock %}
