{% extends "base.html" %}
{% block title %}{{ t('auth.login') }} · {{ t('app.name') }}{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>{{ t('auth.login') }}</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/login">
    <label>{{ t('auth.email') }}<input type="email" name="email" required autofocus /></label>
    <label>{{ t('auth.password') }}<input type="password" name="password" required /></label>
    <button class="btn-primary block" type="submit">{{ t('auth.login') }}</button>
  </form>
  <p class="muted">{{ t('auth.no_account') }} <a href="/register">{{ t('auth.register') }}</a></p>
</div>
{% endblock %}
