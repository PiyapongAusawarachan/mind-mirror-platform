services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mindmirror
      POSTGRES_PASSWORD: mindmirror
      POSTGRES_DB: mindmirror
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindmirror"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      ENV: production
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgresql+psycopg://mindmirror:mindmirror@db:5432/mindmirror
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEFAULT_LANG: ${DEFAULT_LANG:-th}
    volumes:
      - uploads:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
