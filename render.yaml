services:
  - type: web
    name: mind-mirror-platform
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: ENV
        value: production
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: DEFAULT_LANG
        value: th
      - key: ALLOWED_HOSTS
        value: "*"
      - key: SECURE_COOKIES
        value: "true"
      - key: FORCE_HTTPS
        value: "false"
      - key: REQUIRE_PERSISTENT_DB
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: mind-mirror-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: mind-mirror-db
    databaseName: mindmirror
    user: mindmirror
    plan: free
